<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Can We Meet?</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7fbff, #fff8fb);
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 18px;
    }

    .card {
      background: #ffffff;
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.14);
      max-width: 560px;
      width: 100%;
    }

    .icon {
      font-size: 44px;
      margin-bottom: 8px;
    }

    h1 {
      color: #d81b60;
      margin: 8px 0 10px;
      font-size: 28px;
    }

    h2 {
      color: #d81b60;
      margin-top: 24px;
      margin-bottom: 12px;
      font-size: 20px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      margin: 10px 0;
    }

    button, a.confirm-btn {
      margin: 7px;
      padding: 12px 18px;
      border: none;
      border-radius: 25px;
      font-size: 15.5px;
      cursor: pointer;
      transition: 0.25s ease;
      text-decoration: none;
      display: inline-block;
      -webkit-tap-highlight-color: transparent;
    }

    .option-btn {
      background: #f2f2f2;
      color: #333;
    }

    .option-btn:hover {
      background: #ffe0ec;
      transform: translateY(-1px);
    }

    .option-btn.active {
      background: #d81b60;
      color: white;
      box-shadow: 0 5px 12px rgba(216, 27, 96, 0.25);
    }

    .result {
      margin-top: 22px;
      padding: 16px;
      border-radius: 16px;
      background: #fff0f6;
      color: #d81b60;
      font-size: 17px;
      font-weight: bold;
      display: none;
      line-height: 1.5;
    }

    .confirm-area {
      min-height: 105px;
      position: relative;
      margin-top: 10px;
    }

    .confirm-btn {
      background: #25D366;
      color: white;
      display: none;
      margin-top: 16px;
      font-weight: bold;
    }

    .confirm-btn:hover {
      background: #1ebe5d;
    }

    .playful-msg {
      font-size: 14px;
      color: #d81b60;
      min-height: 22px;
      margin-top: 8px;
      font-weight: 600;
    }

    .small {
      font-size: 13.5px;
      color: #666;
      margin-top: 12px;
      line-height: 1.5;
    }

    @media (max-width: 420px) {
      .card {
        padding: 22px 16px;
      }

      h1 {
        font-size: 25px;
      }

      h2 {
        font-size: 18px;
      }

      button, a.confirm-btn {
        width: 85%;
        max-width: 260px;
        margin: 6px auto;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">☕</div>
    <h1>Can We Meet?</h1>

    <p>
      I thought this would be a simple way to plan.
      Please choose whatever feels comfortable for you.
    </p>

    <h2>When can we meet?</h2>
    <button class="option-btn day-btn" onclick="selectOption('day', 'Today (Saturday)', this)">Today (Saturday)</button>
    <button class="option-btn day-btn" onclick="selectOption('day', 'Sunday', this)">Sunday</button>
    <button class="option-btn day-btn" onclick="selectCustomOption('day', 'another day', this)">Suggest another day</button>

    <h2>What time is comfortable?</h2>
    <button class="option-btn time-btn" onclick="selectOption('time', 'morning', this)">Morning</button>
    <button class="option-btn time-btn" onclick="selectOption('time', 'afternoon', this)">Afternoon</button>
    <button class="option-btn time-btn" onclick="selectOption('time', 'evening', this)">Evening</button>
    <button class="option-btn time-btn" onclick="selectCustomOption('time', 'another time', this)">Suggest another time</button>

    <h2>Where shall we meet?</h2>
    <button class="option-btn place-btn" onclick="selectOption('place', 'Coffee Day', this)">Coffee Day ☕</button>
    <button class="option-btn place-btn" onclick="selectOption('place', 'dessert / ice cream', this)">Dessert / Ice Cream 🍨</button>
    <button class="option-btn place-btn" onclick="selectOption('place', 'mall', this)">Mall 🛍️</button>
    <button class="option-btn place-btn" onclick="selectOption('place', 'temple', this)">Temple 🙏</button>
    <button class="option-btn place-btn" onclick="selectCustomOption('place', 'another place', this)">Suggest another place</button>

    <div id="result" class="result"></div>

    <div class="confirm-area">
      <a id="whatsappBtn" class="confirm-btn" target="_blank" rel="noopener noreferrer">
        Confirm on WhatsApp
      </a>
      <div id="playfulMsg" class="playful-msg"></div>
    </div>

    <div class="small">
      No pressure. You can choose what feels comfortable for you.
    </div>
  </div>

  <script>
    let selectedDay = "";
    let selectedTime = "";
    let selectedPlace = "";
    let moveCount = 0;
    const maxMoves = 3;

    // IMPORTANT:
    // Replace this with your WhatsApp number including country code, without + or spaces.
    // Example for India: 919876543210
    const yourWhatsAppNumber = "916362335417";

    function selectOption(type, value, buttonElement) {
      setSelectedValue(type, value);
      setActiveButton(type, buttonElement);
      updateResult();
    }

    function selectCustomOption(type, placeholder, buttonElement) {
      const labelMap = {
        day: "Please type the day you prefer",
        time: "Please type the time you prefer",
        place: "Please type the place you prefer"
      };

      const customValue = prompt(labelMap[type] + ":");

      if (customValue && customValue.trim() !== "") {
        setSelectedValue(type, customValue.trim());
        setActiveButton(type, buttonElement);
        updateResult();
      } else {
        setSelectedValue(type, placeholder);
        setActiveButton(type, buttonElement);
        updateResult();
      }
    }

    function setSelectedValue(type, value) {
      if (type === "day") selectedDay = value;
      if (type === "time") selectedTime = value;
      if (type === "place") selectedPlace = value;
    }

    function setActiveButton(type, buttonElement) {
      const classMap = {
        day: ".day-btn",
        time: ".time-btn",
        place: ".place-btn"
      };

      document.querySelectorAll(classMap[type]).forEach(btn => btn.classList.remove("active"));
      buttonElement.classList.add("active");
    }

    function updateResult() {
      const result = document.getElementById("result");
      const whatsappBtn = document.getElementById("whatsappBtn");

      result.style.display = "block";

      if (!selectedDay) {
        result.innerHTML = "Please choose the day first 😊";
        whatsappBtn.style.display = "none";
        resetConfirmButton();
        return;
      }

      if (!selectedTime) {
        result.innerHTML = selectedDay + " sounds nice 😊 Now choose the time.";
        whatsappBtn.style.display = "none";
        resetConfirmButton();
        return;
      }

      if (!selectedPlace) {
        result.innerHTML = selectedDay + " " + selectedTime + " sounds nice 😊 Now choose the place.";
        whatsappBtn.style.display = "none";
        resetConfirmButton();
        return;
      }

      const finalText = selectedDay + " " + selectedTime + " at " + selectedPlace;
      result.innerHTML = "Sounds good 😊<br>" + finalText + ".";

      const message = "Hi, " + finalText + " works for me.";
      const whatsappUrl = "https://wa.me/" + yourWhatsAppNumber + "?text=" + encodeURIComponent(message);

      whatsappBtn.href = whatsappUrl;
      whatsappBtn.style.display = "inline-block";
      resetConfirmButton();
    }

    function resetConfirmButton() {
      moveCount = 0;
      const whatsappBtn = document.getElementById("whatsappBtn");
      const playfulMsg = document.getElementById("playfulMsg");
      whatsappBtn.style.position = "relative";
      whatsappBtn.style.left = "0px";
      whatsappBtn.style.top = "0px";
      playfulMsg.innerHTML = "";
    }

    function moveButtonPlayfully(event) {
      const whatsappBtn = document.getElementById("whatsappBtn");
      const playfulMsg = document.getElementById("playfulMsg");

      if (moveCount < maxMoves) {
        event.preventDefault();
        moveCount++;

        const messages = [
          "😄 Not so easy...",
          "Almost there...",
          "One last try... ❤️"
        ];

        const positions = [
          { left: "-55px", top: "8px" },
          { left: "55px", top: "-4px" },
          { left: "0px", top: "18px" }
        ];

        whatsappBtn.style.position = "relative";
        whatsappBtn.style.left = positions[moveCount - 1].left;
        whatsappBtn.style.top = positions[moveCount - 1].top;
        playfulMsg.innerHTML = messages[moveCount - 1];

        if (moveCount === maxMoves) {
          setTimeout(() => {
            whatsappBtn.style.left = "0px";
            whatsappBtn.style.top = "0px";
            playfulMsg.innerHTML = "😊 Okay, you got me! Click to confirm.";
          }, 500);
        }
      }
    }

    const whatsappBtn = document.getElementById("whatsappBtn");
    whatsappBtn.addEventListener("click", moveButtonPlayfully);
  </script>
</body>
</html>
