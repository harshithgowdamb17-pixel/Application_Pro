<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Can We Meet?</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7fbff, #fff8fb);
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.14);
      max-width: 520px;
      width: 90%;
    }

    .icon {
      font-size: 46px;
      margin-bottom: 8px;
    }

    h1 {
      color: #d81b60;
      margin-bottom: 10px;
      font-size: 28px;
    }

    h2 {
      color: #d81b60;
      margin-top: 24px;
      margin-bottom: 12px;
      font-size: 20px;
    }

    p {
      font-size: 17px;
      line-height: 1.6;
      margin: 10px 0;
    }

    button, a.confirm-btn {
      margin: 8px;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .date-btn {
      background: #d81b60;
      color: white;
    }

    .date-btn:hover {
      background: #ad1457;
    }

    .place-btn {
      background: #f1f1f1;
      color: #333;
    }

    .place-btn:hover {
      background: #ffe0ec;
    }

    .result {
      margin-top: 22px;
      padding: 15px;
      border-radius: 14px;
      background: #fff0f6;
      color: #d81b60;
      font-size: 18px;
      font-weight: bold;
      display: none;
    }

    .confirm-btn {
      background: #25D366;
      color: white;
      display: none;
      margin-top: 16px;
    }

    .confirm-btn:hover {
      background: #1ebe5d;
    }

    .confirm-area {
      min-height: 96px;
      position: relative;
      margin-top: 8px;
    }

    .playful-msg {
      font-size: 14px;
      color: #d81b60;
      min-height: 22px;
      margin-top: 8px;
      font-weight: 600;
    }

    .small {
      font-size: 14px;
      color: #666;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">☕</div>
    <h1>Can We Meet?</h1>

    <p>
      I thought this would be a simple way to plan.
      Please choose whatever feels comfortable for you.
    </p>

    <h2>When can we meet?</h2>
    <button class="date-btn" onclick="selectDate('Saturday')">Saturday</button>
    <button class="date-btn" onclick="selectDate('Sunday')">Sunday</button>

    <h2>Where shall we meet?</h2>
    <button class="place-btn" onclick="selectPlace('Coffee Day')">Coffee Day ☕</button>
    <button class="place-btn" onclick="selectPlace('Dessert Place')">Dessert Place 🍰</button>
    <button class="place-btn" onclick="selectPlace('Temple')">Temple 🙏</button>
    <button class="place-btn" onclick="selectPlace('Mall')">Mall 🛍️</button>

    <div id="result" class="result"></div>

    <div class="confirm-area">
      <a id="whatsappBtn" class="confirm-btn" target="_blank" rel="noopener noreferrer">
        Confirm on WhatsApp
      </a>
      <div id="playfulMsg" class="playful-msg"></div>
    </div>

    <div class="small">
      No pressure. You can choose what feels comfortable.
    </div>
  </div>

  <script>
    let selectedDate = "";
    let selectedPlace = "";
    let moveCount = 0;
    const maxMoves = 3;

    // Replace this with your WhatsApp number including country code, without + or spaces.
    // Example for India: 919876543210
    const yourWhatsAppNumber = "91XXXXXXXXXX";

    function selectDate(date) {
      selectedDate = date;
      showResult();
    }

    function selectPlace(place) {
      selectedPlace = place;
      showResult();
    }

    function showResult() {
      const result = document.getElementById("result");
      const whatsappBtn = document.getElementById("whatsappBtn");

      if (selectedDate && selectedPlace) {
        result.innerHTML = "Sounds good 😊 " + selectedDate + " at " + selectedPlace + ".";
        result.style.display = "block";

        const message = "Hi, " + selectedDate + " at " + selectedPlace + " works for me.";
        const whatsappUrl = "https://wa.me/" + yourWhatsAppNumber + "?text=" + encodeURIComponent(message);

        whatsappBtn.href = whatsappUrl;
        whatsappBtn.style.display = "inline-block";
        resetConfirmButton();
      } else if (selectedDate) {
        result.innerHTML = selectedDate + " sounds nice 😊 Now choose the place.";
        result.style.display = "block";
        whatsappBtn.style.display = "none";
        resetConfirmButton();
      } else if (selectedPlace) {
        result.innerHTML = selectedPlace + " sounds good 😊 Now choose Saturday or Sunday.";
        result.style.display = "block";
        whatsappBtn.style.display = "none";
        resetConfirmButton();
      }
    }

    function resetConfirmButton() {
      moveCount = 0;
      const whatsappBtn = document.getElementById("whatsappBtn");
      const playfulMsg = document.getElementById("playfulMsg");
      whatsappBtn.style.position = "relative";
      whatsappBtn.style.left = "0px";
      whatsappBtn.style.top = "0px";
      playfulMsg.innerHTML = "";
    }

    function moveButtonPlayfully(event) {
      const whatsappBtn = document.getElementById("whatsappBtn");
      const playfulMsg = document.getElementById("playfulMsg");

      if (moveCount < maxMoves) {
        event.preventDefault();
        moveCount++;

        const messages = [
          "😄 Not so easy...",
          "Almost there...",
          "One last try... ❤️"
        ];

        // Small movement only, so it remains easy and safe to click.
        const positions = [
          { left: "-55px", top: "8px" },
          { left: "55px", top: "-4px" },
          { left: "0px", top: "18px" }
        ];

        whatsappBtn.style.position = "relative";
        whatsappBtn.style.left = positions[moveCount - 1].left;
        whatsappBtn.style.top = positions[moveCount - 1].top;
        playfulMsg.innerHTML = messages[moveCount - 1];

        if (moveCount === maxMoves) {
          setTimeout(() => {
            whatsappBtn.style.left = "0px";
            whatsappBtn.style.top = "0px";
            playfulMsg.innerHTML = "😊 Okay, you got me! Click to confirm.";
          }, 500);
        }
      }
    }

    const whatsappBtn = document.getElementById("whatsappBtn");
    whatsappBtn.addEventListener("click", moveButtonPlayfully);
  </script>
</body>
</html>
