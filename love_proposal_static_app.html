<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Small Proposal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #fff5f8);
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .card {
      background: white;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      max-width: 450px;
      width: 90%;
    }

    h1 {
      color: #e91e63;
      margin-bottom: 10px;
    }

    .heart {
      font-size: 55px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    p {
      font-size: 18px;
      line-height: 1.6;
    }

    button {
      margin: 10px;
      padding: 12px 24px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .yes {
      background: #e91e63;
      color: white;
    }

    .yes:hover {
      background: #c2185b;
    }

    .no {
      background: #f1f1f1;
      color: #333;
    }

    .message {
      margin-top: 20px;
      font-size: 20px;
      color: #e91e63;
      font-weight: bold;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="heart">❤️</div>
    <h1>A Small Message For You</h1>

    <p>
      I do not need perfect words to say this,
      because my heart already knows the truth.
    </p>

    <p>
      You make my days happier, my smile brighter,
      and my life more beautiful.
    </p>

    <h2>Will you be mine?</h2>

    <button class="yes" onclick="showLove()">Yes</button>
    <button class="no" onclick="showWait()">I need time</button>

    <div id="loveMessage" class="message">
      You just made my heart the happiest ❤️
    </div>

    <div id="waitMessage" class="message">
      I will wait with the same care and respect ❤️
    </div>
  </div>

  <script>
    function showLove() {
      document.getElementById("loveMessage").style.display = "block";
      document.getElementById("waitMessage").style.display = "none";
    }

    function showWait() {
      document.getElementById("waitMessage").style.display = "block";
      document.getElementById("loveMessage").style.display = "none";
    }
  </script>
</body>
</html>
